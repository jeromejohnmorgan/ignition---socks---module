# i18n bundle for the GSAP Perspective Designer scope.
# Keys follow the pattern:  ComponentType.PropertyName.DisplayName / .Description
# Adding entries here makes the Designer show human-readable labels in the
# property editor instead of raw JSON keys.

kyvislabs.display.gsapcontainer.name=GSAP Container
kyvislabs.display.gsapcontainer.description=Animate any HTML content using GSAP, driven by Ignition tag values.

kyvislabs.display.gsapcontainer.props.trigger.name=Trigger
kyvislabs.display.gsapcontainer.props.trigger.description=Bind to a tag or expression. The animation replays whenever this value changes.

kyvislabs.display.gsapcontainer.props.animation.name=Animation
kyvislabs.display.gsapcontainer.props.animation.description=GSAP animation configuration (type, target selector, duration, ease, vars, etc.)

kyvislabs.display.gsapcontainer.props.content.name=Content HTML
kyvislabs.display.gsapcontainer.props.content.description=HTML markup for the animation stage. Elements must match the 'target' CSS selector.

kyvislabs.display.gsapcontainer.props.autoplay.name=Autoplay
kyvislabs.display.gsapcontainer.props.autoplay.description=Play the animation automatically on component mount.
